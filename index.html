<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickDnD Engine v2.1 - Master Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f1015;
      --panel-bg: #1a1b26;
      --panel-border: #2e3146;
      --accent-gold: #d4af37;
      --accent-hover: #f1c40f;
      --health-red: #e74c3c;
      --xp-blue: #3498db;
      --text-main: #ecf0f1;
      --font-epic: 'Cinzel', serif;
      --font-ui: 'Lato', sans-serif;
    }

    * { box-sizing: border-box; user-select: none; }

    body {
      margin: 0; padding: 0; height: 100vh; width: 100vw;
      background: var(--bg-dark); color: var(--text-main);
      font-family: var(--font-ui); display: flex; overflow: hidden;
    }

    h1, h2, h3, h4 { font-family: var(--font-epic); margin: 0 0 10px 0; color: var(--accent-gold); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }

    /* LAYOUT */
    #sidebar-container {
      position: relative;
      height: 100vh;
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #sidebar {
      width: 360px;
      height: 100%;
      background: var(--panel-bg);
      border-right: 2px solid var(--accent-gold);
      display: flex;
      flex-direction: column;
      box-shadow: 5px 0 20px rgba(0,0,0,0.8);
      overflow-y: auto;
      padding: 10px;
      gap: 15px;
    }

    #sidebar-toggle {
      position: absolute;
      top: 50%;
      right: -30px;
      width: 30px;
      height: 60px;
      background: var(--panel-bg);
      border: 2px solid var(--accent-gold);
      border-left: none;
      color: var(--accent-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 0 8px 8px 0;
      font-weight: bold;
      box-shadow: 5px 0 10px rgba(0,0,0,0.5);
      transform: translateY(-50%);
    }

    #sidebar-container.collapsed {
      transform: translateX(-360px);
    }

    #map-container {
      flex: 1;
      position: relative;
      background: #111;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    /* UI ELEMENTS */
    .btn {
      background: #2a2d3d; border: 1px solid var(--panel-border); color: var(--text-main);
      padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: var(--font-ui);
      transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center;
    }
    .btn:hover { background: #3a3e52; border-color: var(--accent-hover); color: white; }
    .btn-gold { border-color: var(--accent-gold); color: var(--accent-gold); font-family: var(--font-epic); }
    
    .flex-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }

    .control-group {
      background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border);
      border-radius: 6px; padding: 10px; margin-bottom: 5px;
    }

    /* MAP TABS */
    #map-tabs { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; }
    .map-tab {
      padding: 5px 10px; background: #222; border: 1px solid #444; border-radius: 4px;
      cursor: pointer; white-space: nowrap; font-size: 12px;
    }
    .map-tab.active { background: var(--accent-gold); color: black; border-color: white; font-weight: bold; }

    /* PLAYERS */
    .player-card {
      background: #1e202e; border-left: 4px solid; padding: 8px; border-radius: 4px; margin-bottom: 8px;
    }
    .stat-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; margin-top: 4px; }
    .stat-ctrl { display: flex; align-items: center; gap: 8px; background: #111; padding: 2px 6px; border-radius: 4px; }
    .stat-btn { background: transparent; border: none; color: white; cursor: pointer; font-size: 16px; font-weight: bold; }
    .stat-btn:hover { color: var(--accent-hover); }
    
    .xp-bar-bg { width: 100px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-left: 5px; }
    .xp-bar-fill { height: 100%; background: var(--xp-blue); width: 0%; transition: width 0.3s ease; }

    /* SPINNER */
    #spinner-readout {
      height: 60px; background: #0a0a0e; border: 1px solid var(--accent-gold); border-radius: 6px;
      display: flex; align-items: center; justify-content: center; font-family: var(--font-epic);
      font-size: 18px; font-weight: bold; text-align: center; margin-top: 10px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
    }

    /* TARGET / SELECTION PANEL */
    #target-panel { display: none; border-color: var(--health-red); }
    #target-panel.active { display: block; }

    /* ASSET GRIDS */
    .asset-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 5px;
      max-height: 150px; overflow-y: auto; padding: 5px; background: rgba(0,0,0,0.2); border-radius: 4px;
    }
    .asset-item {
      font-size: 24px; text-align: center; cursor: grab; padding: 5px; background: #2a2d3d;
      border-radius: 4px; border: 1px solid transparent; transition: all 0.2s;
    }
    .asset-item:hover { border-color: var(--accent-gold); transform: scale(1.1); }

    /* SPRITES ON MAP */
    .sprite {
      position: absolute; display: flex; flex-direction: column; align-items: center;
      cursor: grab; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8)); z-index: 10;
      transform-origin: center bottom;
    }
    .sprite:active { cursor: grabbing; }
    .sprite.selected { filter: drop-shadow(0 0 10px var(--accent-gold)); z-index: 100; }
    .sprite-emoji { font-size: 48px; line-height: 1; }
    .sprite-label {
      font-family: var(--font-ui); font-weight: bold; font-size: 12px; color: white;
      background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 8px; margin-top: 2px;
      pointer-events: none; white-space: nowrap;
    }
    
    .hp-bar-container {
      width: 40px; height: 6px; background: #000; border: 1px solid #333;
      border-radius: 3px; margin-top: 4px; overflow: hidden; pointer-events: none;
    }
    .hp-bar-fill { height: 100%; background: var(--health-red); width: 100%; transition: width 0.3s; }

  </style>
</head>
<body>

  <div id="sidebar-container">
    <div id="sidebar-toggle" onclick="toggleSidebar()">></div>
    <div id="sidebar">
      
      <div class="control-group">
        <div class="flex-between">
          <h4>Maps</h4>
          <div class="flex-row">
            <button class="btn" onclick="addMap()">+ Map</button>
            <button class="btn" onclick="cycleBackground()">🔄 BG</button>
          </div>
        </div>
        <div id="map-tabs"></div>
      </div>

      <div id="target-panel" class="control-group">
        <h4>Target Selected</h4>
        <div class="flex-between" style="margin-bottom: 5px;">
          <span id="target-name" style="font-weight:bold; color:var(--accent-hover);">None</span>
          <div class="stat-ctrl">
            Size: 
            <button class="stat-btn" onclick="resizeTarget(-0.2)">-</button>
            <span id="target-size-readout">1.0</span>
            <button class="stat-btn" onclick="resizeTarget(0.2)">+</button>
          </div>
        </div>
        <div class="flex-between" id="target-hp-controls" style="display:none;">
          <div class="stat-ctrl">
            HP:
            <button class="stat-btn" onclick="modifyTargetHp(-1)">-</button>
            <span id="target-hp-readout">10</span>
            <button class="stat-btn" onclick="modifyTargetHp(1)">+</button>
          </div>
          <button class="btn" style="background:var(--health-red); color:white;" onclick="killAndLootTarget()">Kill & Loot</button>
        </div>
      </div>

      <div class="control-group">
        <h4>Action Spinner</h4>
        <div class="flex-row" style="justify-content: center;">
          <button class="btn btn-gold" onclick="spinWheel('Trivial', 5)">Trivial</button>
          <button class="btn btn-gold" onclick="spinWheel('Easy', 10)">Easy</button>
          <button class="btn btn-gold" onclick="spinWheel('Medium', 15)">Medium</button>
          <button class="btn btn-gold" onclick="spinWheel('Hard', 20)">Hard</button>
          <button class="btn btn-gold" onclick="spinWheel('Legend', 25)">Legend</button>
        </div>
        <div id="spinner-readout">Ready</div>
      </div>

      <div class="control-group">
        <div class="flex-between">
          <h4>Party</h4>
          <button class="btn" onclick="addPlayer()">+ Player</button>
        </div>
        <div id="players-list"></div>
      </div>

      <div class="control-group">
        <h4>Bestiary</h4>
        <div class="asset-grid" id="grid-bestiary"></div>
      </div>
      <div class="control-group">
        <h4>Environment & Items</h4>
        <div class="asset-grid" id="grid-sprites"></div>
      </div>

      <button class="btn" style="width:100%; margin-top:auto;" onclick="saveStateFile()">💾 Save Campaign to File</button>

    </div>
  </div>

  <div id="map-container" ondragover="event.preventDefault()" ondrop="handleMapDrop(event)" onclick="handleMapClick(event)">
  </div>

  <script>
    /* ==========================================
       STATE & DATA
       ========================================== */
    const BACKGROUNDS = [
      'repeating-linear-gradient(45deg, #2e7d32 0, #2e7d32 20px, #388e3c 20px, #388e3c 40px)', // Grass
      'repeating-linear-gradient(45deg, #555 0px, #555 15px, #444 15px, #444 30px)', // Stone
      'repeating-linear-gradient(45deg, #8B5A2B 0px, #8B5A2B 15px, #6e3f1a 15px, #6e3f1a 30px)', // Wood
      'repeating-linear-gradient(45deg, #c2b280 0px, #c2b280 20px, #b2a170 20px, #b2a170 40px)', // Sand
      'repeating-linear-gradient(45deg, #2e302b 0, #2e302b 20px, #262823 20px, #262823 40px)' // Dark Grid
    ];

    const BESTIARY = [
      { e: "🐀", n: "Giant Rat", hp: 6 }, { e: "🕷️", n: "Spider", hp: 12 },
      { e: "🐺", n: "Dire Wolf", hp: 18 }, { e: "👺", n: "Goblin", hp: 15 },
      { e: "💀", n: "Skeleton", hp: 12 }, { e: "🧟", n: "Zombie", hp: 20 },
      { e: "👹", n: "Orc", hp: 30 }, { e: "🧛", n: "Vampire", hp: 50 },
      { e: "🧙", n: "Cultist", hp: 22 }, { e: "🐉", n: "Dragon", hp: 100 }
    ];

    const SPRITES = [
      { e: "🌳", n: "Tree" }, { e: "🌲", n: "Pine" }, { e: "🪨", n: "Rock" },
      { e: "🪵", n: "Log" }, { e: "🔥", n: "Fire" }, { e: "⛺", n: "Tent" },
      { e: "🧱", n: "Wall" }, { e: "🚪", n: "Door" }, { e: "📦", n: "Crate" },
      { e: "宝", n: "Chest" }, { e: "🗡️", n: "Sword" }, { e: "🛡️", n: "Shield" },
      { e: "🧪", n: "Potion" }, { e: "💰", n: "Gold" }, { e: "📜", n: "Scroll" }
    ];

    const SPINNER_OUTCOMES = [
      { text: "Critical Success!", xp: 5, color: "#f1c40f" },
      { text: "Success", xp: 3, color: "#2ecc71" },
      { text: "Barely Passed", xp: 1, color: "#95a5a6" },
      { text: "Barely Failed", xp: 0, color: "#e67e22" },
      { text: "Failure", xp: 0, color: "#e74c3c" },
      { text: "Catastrophic Failure", xp: 0, color: "#8b0000" }
    ];

    let state = {
      maps: [{ id: 1, name: "Map 1", bgIndex: 0, entities: [] }],
      currentMapId: 1,
      players: [],
      playerIdCounter: 1,
      entityIdCounter: 1
    };

    let selectedEntityId = null;

    /* ==========================================
       INITIALIZATION
       ========================================== */
    function init() {
      populateGrid('grid-bestiary', BESTIARY, 'bestiary');
      populateGrid('grid-sprites', SPRITES, 'sprite');
      renderTabs();
      renderMap();
      renderPlayers();
    }

    function toggleSidebar() {
      const container = document.getElementById('sidebar-container');
      const toggle = document.getElementById('sidebar-toggle');
      container.classList.toggle('collapsed');
      toggle.textContent = container.classList.contains('collapsed') ? '<' : '>';
    }

    /* ==========================================
       MAP & BACKGROUNDS
       ========================================== */
    function getActiveMap() {
      return state.maps.find(m => m.id === state.currentMapId);
    }

    function addMap() {
      const newId = Date.now();
      state.maps.push({ id: newId, name: `Map ${state.maps.length + 1}`, bgIndex: 0, entities: [] });
      state.currentMapId = newId;
      renderTabs();
      renderMap();
    }

    function switchMap(id) {
      selectedEntityId = null;
      updateTargetPanel();
      state.currentMapId = id;
      renderTabs();
      renderMap();
    }

    function cycleBackground() {
      const map = getActiveMap();
      map.bgIndex = (map.bgIndex + 1) % BACKGROUNDS.length;
      document.getElementById('map-container').style.background = BACKGROUNDS[map.bgIndex];
    }

    function renderTabs() {
      const container = document.getElementById('map-tabs');
      container.innerHTML = '';
      state.maps.forEach(m => {
        const btn = document.createElement('div');
        btn.className = `map-tab ${m.id === state.currentMapId ? 'active' : ''}`;
        btn.textContent = m.name;
        btn.onclick = () => switchMap(m.id);
        container.appendChild(btn);
      });
    }

    function renderMap() {
      const mapContainer = document.getElementById('map-container');
      const map = getActiveMap();
      mapContainer.style.background = BACKGROUNDS[map.bgIndex];
      mapContainer.innerHTML = ''; // Clear sprites

      map.entities.forEach(ent => {
        const el = document.createElement('div');
        el.className = `sprite ${ent.id === selectedEntityId ? 'selected' : ''}`;
        el.id = `ent-${ent.id}`;
        el.style.left = ent.x + 'px';
        el.style.top = ent.y + 'px';
        
        let html = `<div class="sprite-emoji" style="transform: scale(${ent.scale || 1})">${ent.emoji}</div>`;
        html += `<div class="sprite-label">${ent.name}</div>`;
        
        if (ent.type === 'enemy') {
          const pct = Math.max(0, (ent.hp / ent.maxHp) * 100);
          html += `<div class="hp-bar-container"><div class="hp-bar-fill" style="width:${pct}%"></div></div>`;
        }
        
        el.innerHTML = html;
        setupDrag(el, ent);
        mapContainer.appendChild(el);
      });
    }

    function handleMapClick(e) {
      if (e.target.id === 'map-container') {
        selectedEntityId = null;
        renderMap();
        updateTargetPanel();
      }
    }

    /* ==========================================
       DRAG & DROP / ASSETS
       ========================================== */
    function populateGrid(containerId, dataArray, type) {
      const container = document.getElementById(containerId);
      dataArray.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'asset-item';
        div.textContent = item.e;
        div.title = item.n;
        div.draggable = true;
        div.ondragstart = (e) => {
          e.dataTransfer.setData('text/plain', JSON.stringify({ source: type, index: index }));
        };
        container.appendChild(div);
      });
    }

    function handleMapDrop(e) {
      e.preventDefault();
      const raw = e.dataTransfer.getData('text/plain');
      if (!raw) return;
      
      const mapRect = document.getElementById('map-container').getBoundingClientRect();
      const x = e.clientX - mapRect.left - 24; 
      const y = e.clientY - mapRect.top - 24;
      const map = getActiveMap();

      try {
        const data = JSON.parse(raw);
        let blueprint = null;
        let entType = 'sprite';

        if (data.source === 'bestiary') {
          blueprint = BESTIARY[data.index];
          entType = 'enemy';
        } else if (data.source === 'sprite') {
          blueprint = SPRITES[data.index];
        } else if (data.source === 'player') {
          const p = state.players.find(p => p.id === data.playerId);
          blueprint = { e: p.color, n: p.name };
          entType = 'player';
        }

        if (blueprint) {
          const newEnt = {
            id: state.entityIdCounter++,
            type: entType,
            emoji: blueprint.e,
            name: blueprint.n,
            x: x, y: y,
            scale: 1.0
          };
          
          if (entType === 'enemy') {
            const avgLvl = getAvgPartyLevel();
            newEnt.maxHp = Math.floor(blueprint.hp + (avgLvl * 2));
            newEnt.hp = newEnt.maxHp;
          }

          map.entities.push(newEnt);
          selectedEntityId = newEnt.id; // Auto select new drop
          renderMap();
          updateTargetPanel();
        }
      } catch (err) { console.error("Drop Parse Error"); }
    }

    function setupDrag(el, ent) {
      let isDragging = false;
      let offsetX, offsetY;

      el.addEventListener('mousedown', e => {
        e.stopPropagation(); // Prevent map click
        if (e.button === 2) return;
        isDragging = true;
        offsetX = e.offsetX;
        offsetY = e.offsetY;
        selectedEntityId = ent.id;
        renderMap(); // Update visuals for selection
        updateTargetPanel();
      });

      document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const rect = document.getElementById('map-container').getBoundingClientRect();
        ent.x = e.clientX - rect.left - offsetX;
        ent.y = e.clientY - rect.top - offsetY;
        el.style.left = ent.x + 'px';
        el.style.top = ent.y + 'px';
      });

      document.addEventListener('mouseup', () => { isDragging = false; });
    }

    /* ==========================================
       TARGET SELECTION & MODIFICATION
       ========================================== */
    function updateTargetPanel() {
      const panel = document.getElementById('target-panel');
      const map = getActiveMap();
      const ent = map.entities.find(e => e.id === selectedEntityId);

      if (!ent) {
        panel.classList.remove('active');
        return;
      }

      panel.classList.add('active');
      document.getElementById('target-name').textContent = `${ent.emoji} ${ent.name}`;
      document.getElementById('target-size-readout').textContent = ent.scale.toFixed(1);

      const hpControls = document.getElementById('target-hp-controls');
      if (ent.type === 'enemy') {
        hpControls.style.display = 'flex';
        document.getElementById('target-hp-readout').textContent = `${ent.hp}/${ent.maxHp}`;
      } else {
        hpControls.style.display = 'none';
      }
    }

    function resizeTarget(amount) {
      const map = getActiveMap();
      const ent = map.entities.find(e => e.id === selectedEntityId);
      if (ent) {
        ent.scale = Math.max(0.4, Math.min(5.0, ent.scale + amount));
        renderMap();
        updateTargetPanel();
      }
    }

    function modifyTargetHp(amount) {
      const map = getActiveMap();
      const ent = map.entities.find(e => e.id === selectedEntityId);
      if (ent && ent.type === 'enemy') {
        ent.hp = Math.max(0, Math.min(ent.maxHp, ent.hp + amount));
        renderMap();
        updateTargetPanel();
      }
    }

    function killAndLootTarget() {
      const map = getActiveMap();
      const entIndex = map.entities.findIndex(e => e.id === selectedEntityId);
      if (entIndex > -1) {
        const ent = map.entities[entIndex];
        // Award XP based on max HP
        awardPartyXp(Math.max(1, Math.floor(ent.maxHp / 2)));
        
        // Remove enemy
        map.entities.splice(entIndex, 1);
        
        // Drop generic loot crate where they died
        map.entities.push({
          id: state.entityIdCounter++, type: 'sprite', emoji: '宝', name: 'Loot',
          x: ent.x, y: ent.y, scale: 1.0
        });

        selectedEntityId = null;
        renderMap();
        updateTargetPanel();
      }
    }

    /* ==========================================
       PLAYERS & XP SYSTEM
       ========================================== */
    function getAvgPartyLevel() {
      if (state.players.length === 0) return 1;
      return Math.floor(state.players.reduce((s, p) => s + p.level, 0) / state.players.length);
    }

    function addPlayer() {
      const colors = ['🔴','🔵','🟢','🟣','🟡'];
      const color = colors[(state.playerIdCounter - 1) % colors.length];
      state.players.push({
        id: state.playerIdCounter++, name: "Hero", color: color,
        level: 1, hp: 20, maxHp: 20, xp: 0
      });
      renderPlayers();
    }

    function renderPlayers() {
      const list = document.getElementById('players-list');
      list.innerHTML = '';
      state.players.forEach(p => {
        const xpReq = p.level * 10;
        const xpPct = Math.min(100, (p.xp / xpReq) * 100);
        
        const card = document.createElement('div');
        card.className = 'player-card';
        card.style.borderColor = getHexFromEmoji(p.color);
        card.innerHTML = `
          <div class="flex-between">
            <div class="flex-row">
              <span style="cursor:grab; font-size:20px;" draggable="true" ondragstart="startPlayerDrag(event, ${p.id})">${p.color}</span>
              <strong contenteditable="true" onblur="updatePlayerName(${p.id}, this.textContent)">${p.name}</strong>
              <span style="font-size:12px; color:#888;">Lvl ${p.level}</span>
            </div>
          </div>
          <div class="stat-row">
            <div class="flex-row">HP: 
              <div class="stat-ctrl">
                <button class="stat-btn" onclick="modPlayerHp(${p.id}, -1)">-</button>
                <span>${p.hp}/${p.maxHp}</span>
                <button class="stat-btn" onclick="modPlayerHp(${p.id}, 1)">+</button>
              </div>
            </div>
          </div>
          <div class="stat-row">
            <div class="flex-row">
              <button class="btn" style="padding:2px 6px; font-size:10px;" onclick="awardPlayerXp(${p.id}, 1)">+1 XP</button>
              <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
            </div>
            <span style="font-size:10px; color:#aaa;">${p.xp}/${xpReq}</span>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function getHexFromEmoji(emoji) {
      const map = {'🔴':'#e74c3c','🔵':'#3498db','🟢':'#2ecc71','🟣':'#9b59b6','🟡':'#f1c40f'};
      return map[emoji] || '#fff';
    }

    function startPlayerDrag(e, pid) {
      e.dataTransfer.setData('text/plain', JSON.stringify({ source: 'player', playerId: pid }));
    }

    function updatePlayerName(id, newName) {
      const p = state.players.find(x => x.id === id);
      if (p) p.name = newName;
    }

    function modPlayerHp(id, amt) {
      const p = state.players.find(x => x.id === id);
      if (p) {
        p.hp = Math.max(0, Math.min(p.maxHp, p.hp + amt));
        renderPlayers();
      }
    }

    function awardPlayerXp(id, amt) {
      const p = state.players.find(x => x.id === id);
      if (p) {
        p.xp += amt;
        const req = p.level * 10;
        if (p.xp >= req) {
          p.xp -= req;
          p.level++;
          p.maxHp += 5;
          p.hp = p.maxHp;
        }
        renderPlayers();
      }
    }

    function awardPartyXp(amt) {
      state.players.forEach(p => awardPlayerXp(p.id, amt));
    }

    /* ==========================================
       SPINNER (ROULETTE STYLE)
       ========================================== */
    function spinWheel(difficulty, dcBase) {
      const readout = document.getElementById('spinner-readout');
      const partyLvl = getAvgPartyLevel();
      const targetDc = dcBase; // DC mechanic visual reference
      
      // Determine final outcome
      const roll = Math.floor(Math.random() * 20) + 1;
      const total = roll + partyLvl;
      
      let finalOutcome;
      if (roll === 20) finalOutcome = SPINNER_OUTCOMES[0]; // Crit
      else if (roll === 1) finalOutcome = SPINNER_OUTCOMES[5]; // Catastrophic
      else if (total >= targetDc + 5) finalOutcome = SPINNER_OUTCOMES[0];
      else if (total >= targetDc) finalOutcome = SPINNER_OUTCOMES[1];
      else if (total >= targetDc - 2) finalOutcome = SPINNER_OUTCOMES[2];
      else if (total >= targetDc - 5) finalOutcome = SPINNER_OUTCOMES[3];
      else finalOutcome = SPINNER_OUTCOMES[4];

      // Roulette Animation
      let duration = 2500;
      let interval = 50;
      let elapsed = 0;
      
      readout.style.color = "white";
      readout.style.textShadow = "none";

      const spinInterval = setInterval(() => {
        elapsed += interval;
        interval += 5; // Slow down effect
        
        const randomOutcome = SPINNER_OUTCOMES[Math.floor(Math.random() * SPINNER_OUTCOMES.length)];
        readout.textContent = randomOutcome.text;

        if (elapsed >= duration) {
          clearInterval(spinInterval);
          readout.textContent = finalOutcome.text;
          readout.style.color = finalOutcome.color;
          readout.style.textShadow = `0 0 10px ${finalOutcome.color}`;
          
          if (finalOutcome.xp > 0) {
            awardPartyXp(finalOutcome.xp);
          }
        }
      }, interval);
    }

    /* ==========================================
       FILE EXPORT
       ========================================== */
    function saveStateFile() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
      const a = document.createElement('a');
      a.href = dataStr;
      a.download = "QuickDnD_Campaign.json";
      a.click();
    }

    // BOOTSTRAP
    window.onload = init;

  </script>
