<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickDnD Engine v2.0 - Master Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Global Styles */
    * { box-sizing: border-box; user-select: none; }
    body {
      margin: 0; overflow: hidden; height: 100vh;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a0c; color: white;
    }
    
    /* Welcome Screen Styles */
    #welcome-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      display: flex; justify-content: center; align-items: center; z-index: 10000;
    }
    .welcome-container {
      text-align: center; background: rgba(0,0,0,0.85); padding: 40px;
      max-width: 500px; border-radius: 10px; border: 2px solid #d4af37;
    }
    #welcome-screen h1 { color: #d4af37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
    #welcome-screen button {
      margin: 10px; padding: 10px 20px; font-size: 18px; border: 1px solid #d4af37;
      border-radius: 5px; cursor: pointer; transition: all 0.3s ease;
      background: #222; color: #fff; font-family: 'Orbitron', sans-serif;
    }
    #welcome-screen button:hover { background: #d4af37; color: #000; }
    
    .exit-screen { animation: coolWipe 0.8s forwards ease-in-out; }
    @keyframes coolWipe { 0% { clip-path: inset(0 0 0 0); } 100% { clip-path: inset(0 100% 0 0); } }

    /* Map Area (Full Screen) */
    #map-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden; z-index: 1;
    }
    #map-background {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
    }
    
    /* Sprites */
    .sprite {
      position: absolute; display: flex; flex-direction: column; align-items: center;
      padding: 2px; z-index: 10; cursor: grab; transition: filter 0.2s;
    }
    .sprite:active { cursor: grabbing; }
    .sprite.selected { filter: drop-shadow(0 0 12px #d4af37); z-index: 100; }
    .sprite.targeted { filter: drop-shadow(0 0 15px #ff0000); cursor: crosshair; }
    .sprite-emoji { font-size: 80px; line-height: 1; transform-origin: center bottom; }
    .sprite-label {
      font-size: 12px; color: white; background: rgba(0, 0, 0, 0.7);
      padding: 2px 6px; border-radius: 4px; margin-top: 4px; border: 1px solid #555; pointer-events: none;
    }
    
    /* Smart Enemy HP Bar */
    .hp-bar-container {
      width: 100%; height: 6px; background: #000; border: 1px solid #333;
      border-radius: 3px; margin-top: 5px; overflow: hidden; pointer-events: none;
    }
    .hp-bar-fill { height: 100%; background: #e74c3c; width: 100%; transition: width 0.3s; }

    /* Damage Animation */
    .dmg-text {
      position: absolute; color: #ff3333; font-size: 36px; font-weight: bold;
      text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 1000;
      animation: floatUp 1.2s forwards ease-out;
    }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }

    /* Floating Overlay Sidebar */
    #sidebar-wrapper {
      position: absolute; top: 0; right: 0; height: 100%; z-index: 1000;
      display: flex; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #sidebar-wrapper.collapsed { transform: translateX(100%); }
    
    #sidebar-toggle {
      width: 30px; height: 60px; background: #1a1a1a; color: #d4af37;
      border: 2px solid #333; border-right: none; border-radius: 8px 0 0 8px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      margin-top: 20px; font-weight: bold; font-size: 18px;
    }
    
    #sidebar {
      width: 340px; height: 100%; background: rgba(20, 20, 22, 0.95);
      border-left: 2px solid #d4af37; padding: 15px; display: flex;
      flex-direction: column; gap: 10px; overflow-y: auto; box-shadow: -5px 0 20px rgba(0,0,0,0.8);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

    /* Sidebar Modules */
    .panel {
      background: #1e1e24; border: 1px solid #333; border-radius: 6px; padding: 10px;
    }
    h3 { margin: 0 0 10px 0; font-size: 14px; color: #d4af37; border-bottom: 1px solid #333; padding-bottom: 5px; }
    
    .btn {
      background: #333; color: white; border: 1px solid #555; padding: 6px 10px;
      cursor: pointer; border-radius: 4px; font-family: 'Orbitron', sans-serif; transition: 0.2s;
    }
    .btn:hover { background: #444; border-color: #d4af37; }
    .btn-gold { border-color: #d4af37; color: #d4af37; }
    
    .flex-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }

    /* Tabs & Backgrounds */
    #map-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
    .map-tab { padding: 4px 8px; background: #222; border: 1px solid #444; cursor: pointer; font-size: 12px; }
    .map-tab.active { background: #d4af37; color: black; font-weight: bold; }
    #bg-picker { display: flex; gap: 5px; flex-wrap: wrap; max-height: 80px; overflow-y: auto; }
    .bg-thumb { width: 30px; height: 30px; cursor: pointer; border: 1px solid #555; }

    /* Selection & Target Panel */
    #selection-panel { display: none; border-color: #d4af37; }
    #selection-panel.active { display: block; }
    
    /* Math Controls (+/-) */
    .math-ctrl { display: flex; align-items: center; gap: 8px; background: #111; padding: 2px 6px; border-radius: 4px; }
    .math-btn { background: none; border: none; color: white; cursor: pointer; font-size: 16px; font-weight: bold; }
    .math-btn:hover { color: #d4af37; }

    /* Players */
    .player-box { background: #15151a; border-left: 4px solid; padding: 8px; margin-bottom: 8px; border-radius: 4px; }
    .p-stat { display: flex; justify-content: space-between; margin-top: 5px; font-size: 12px; align-items: center; }
    .xp-bar { flex: 1; height: 6px; background: #000; margin: 0 10px; border-radius: 3px; overflow: hidden; }
    .xp-fill { height: 100%; background: #3498db; width: 0%; transition: width 0.3s; }
    .inventory { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; padding: 4px; background: #0a0a0c; min-height: 24px; }
    .inv-item { font-size: 10px; background: #333; padding: 2px 4px; border-radius: 3px; cursor: grab; border: 1px solid #555; }

    /* Spinner */
    #spinner-readout {
      height: 50px; background: #000; border: 1px solid #d4af37; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      font-weight: bold; margin-top: 10px; text-align: center;
    }

    /* Assets Grid */
    .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 5px; max-height: 120px; overflow-y: auto; }
    .asset-item { font-size: 24px; text-align: center; cursor: grab; padding: 2px; background: #222; border-radius: 4px; }
    .asset-item:hover { border: 1px solid #d4af37; }

  </style>
</head>
<body>

  <div id="welcome-screen">
    <div class="welcome-container">
      <h1>QuickDnD v2.0 Master</h1>
      <p>Cinematic tools. Smart combat. Zero friction.</p>
      <button onclick="startEngine(false)">New Campaign</button>
      <button onclick="document.getElementById('welcome-load-file').click()">Load JSON</button>
      <input type="file" id="welcome-load-file" accept=".json,.txt" style="display:none" onchange="loadGame(event)">
    </div>
  </div>

  <div id="map-container" ondragover="event.preventDefault()" ondrop="onMapDrop(event)" onclick="handleMapClick(event)">
    <div id="map-background"></div>
  </div>

  <div id="sidebar-wrapper">
    <div id="sidebar-toggle" onclick="toggleSidebar()">></div>
    <div id="sidebar">
      
      <div class="flex-between">
        <button class="btn btn-gold" onclick="toggleSidebar()">📺 TV Mode</button>
        <button class="btn" onclick="manualSave()">💾 Export JSON</button>
      </div>

      <div class="panel">
        <div class="flex-between"><h3>Maps</h3> <button class="btn" onclick="addMap()">+ Map</button></div>
        <div id="map-tabs"></div>
        <div id="bg-picker"></div>
      </div>

      <div class="panel" id="selection-panel">
        <h3>Selected Target</h3>
        <div class="flex-between" style="margin-bottom: 5px;">
          <span id="sel-name" style="font-weight:bold; color:#d4af37;">None</span>
          <div class="math-ctrl">
            Scale
            <button class="math-btn" onclick="resizeSelected(-0.1)">-</button>
            <span id="sel-scale">1.0</span>
            <button class="math-btn" onclick="resizeSelected(0.1)">+</button>
          </div>
        </div>
        <div class="flex-between" id="sel-hp-row" style="display:none;">
          <div class="math-ctrl">
            HP
            <button class="math-btn" onclick="modifySelectedHp(-1)">-</button>
            <span id="sel-hp">10/10</span>
            <button class="math-btn" onclick="modifySelectedHp(1)">+</button>
          </div>
          <button class="btn" style="background:#e74c3c; border:none;" onclick="killSelected()">Kill</button>
        </div>
      </div>

      <div class="panel">
        <h3>Action Spinner</h3>
        <div class="flex-row" style="justify-content: center;">
          <button class="btn btn-gold" onclick="spinWheel(5)">Trivial</button>
          <button class="btn btn-gold" onclick="spinWheel(10)">Easy</button>
          <button class="btn btn-gold" onclick="spinWheel(15)">Medium</button>
          <button class="btn btn-gold" onclick="spinWheel(20)">Hard</button>
          <button class="btn btn-gold" onclick="spinWheel(25)">Legend</button>
        </div>
        <div id="spinner-readout">Awaiting Roll</div>
      </div>

      <div class="panel">
        <div class="flex-between"><h3>Party</h3> <button class="btn" onclick="addPlayer()">+ Player</button></div>
        <div id="players-list"></div>
      </div>

      <div class="panel">
        <h3>Bestiary (Auto-Scales HP)</h3>
        <div class="asset-grid" id="grid-enemies"></div>
      </div>
      <div class="panel">
        <h3>Props & Tokens</h3>
        <div class="asset-grid" id="grid-props"></div>
      </div>
      <div class="panel">
        <h3>Loot Drop</h3>
        <div class="flex-row">
          <button class="btn" style="flex:1" onclick="dropLoot('average')">Average</button>
          <button class="btn" style="flex:1" onclick="dropLoot('good')">Good</button>
          <button class="btn" style="flex:1; border-color:#9b59b6; color:#9b59b6;" onclick="dropLoot('mythic')">Mythic</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    /****************************************************************
     * CORE DATA & DICTIONARIES
     ****************************************************************/
    const backgrounds = [
      { style: 'repeating-linear-gradient(45deg, #2e302b 0, #2e302b 20px, #262823 20px, #262823 40px)' }, // Dark Grid
      { style: 'repeating-linear-gradient(45deg, #2e7d32 0px, #2e7d32 15px, #388e3c 15px, #388e3c 30px)' }, // Grass
      { style: 'repeating-linear-gradient(45deg, #555 0px, #555 15px, #444 15px, #444 30px)' }, // Stone
      { style: 'repeating-linear-gradient(45deg, #c2b280 0px, #c2b280 20px, #b2a170 20px, #b2a170 40px)' }, // Sand
      { style: 'repeating-linear-gradient(45deg, #8B5A2B 0px, #8B5A2B 15px, #6e3f1a 15px, #6e3f1a 30px)' }  // Wood
    ];

    const propData = [
      ['🌳', 'Tree'], ['🌲', 'Pine'], ['🪨', 'Rock'], ['🧱', 'Wall'], ['🚪', 'Door'],
      ['🪵', 'Log'], ['🔥', 'Fire'], ['⛺', 'Tent'], ['📦', 'Crate'], ['宝', 'Chest'],
      ['🩸', 'Blood'], ['⚔️', 'Swords'], ['🛡️', 'Shield'], ['🔮', 'Crystal'], ['☠️', 'Bones']
    ];

    const enemyData = [
      { e: '🐀', n: 'Giant Rat', baseHp: 6 }, { e: '🕷️', n: 'Spider', baseHp: 12 },
      { e: '👺', n: 'Goblin', baseHp: 15 }, { e: '🐺', n: 'Dire Wolf', baseHp: 20 },
      { e: '👹', n: 'Orc', baseHp: 30 }, { e: '🧙', n: 'Cultist', baseHp: 25 },
      { e: '🧟', n: 'Zombie', baseHp: 22 }, { e: '🐉', n: 'Dragon', baseHp: 100 }
    ];

    const lootTables = {
      average: [
        { emoji: '🗡️', name: 'Rusty Blade', bonus: 1 },
        { emoji: '🧪', name: 'Minor Potion', bonus: 0 },
        { emoji: '💰', name: 'Gold Pouch', bonus: 0 }
      ],
      good: [
        { emoji: '⚔️', name: 'Steel Broadsword', bonus: 3 },
        { emoji: '🛡️', name: 'Kite Shield', bonus: 1 },
        { emoji: '💍', name: 'Ring of Focus', bonus: 2 }
      ],
      mythic: [
        { emoji: '⚡', name: 'Stormbringer', bonus: 6 },
        { emoji: '👑', name: 'Crown of Kings', bonus: 4 },
        { emoji: '⏳', name: 'Time Amulet', bonus: 5 }
      ]
    };

    const spinOutcomes = [
      { text: "Critical Success!", xp: 5, color: "#f1c40f" },
      { text: "Success", xp: 3, color: "#2ecc71" },
      { text: "Barely Passed", xp: 1, color: "#95a5a6" },
      { text: "Barely Failed", xp: 0, color: "#e67e22" },
      { text: "Failure", xp: 0, color: "#e74c3c" },
      { text: "Catastrophic Failure", xp: 0, color: "#8b0000" }
    ];

    /****************************************************************
     * STATE MANAGEMENT
     ****************************************************************/
    let maps = [{ name: "Map 1", background: backgrounds[0].style, sprites: [] }];
    let currentMap = 0;
    let players = [];
    let selectedSprite = null;
    let pendingDamage = 0;

    function saveToLocal() {
      const data = gatherAllData();
      localStorage.setItem('quickdnd_v2_save', JSON.stringify(data));
    }

    function gatherAllData() {
      // Serialize DOM sprites to data objects
      const savedMaps = maps.map(m => {
        const spriteData = m.sprites.map(sp => {
          const emojiEl = sp.querySelector('.sprite-emoji');
          const isEnemy = sp.hasAttribute('data-hp');
          return {
            x: parseFloat(sp.style.left) || 0,
            y: parseFloat(sp.style.top) || 0,
            scale: parseFloat(sp.getAttribute('data-scale')) || 1.0,
            emoji: emojiEl.textContent,
            label: sp.querySelector('.sprite-label').textContent,
            isEnemy: isEnemy,
            hp: isEnemy ? parseInt(sp.getAttribute('data-hp')) : null,
            maxHp: isEnemy ? parseInt(sp.getAttribute('data-maxhp')) : null
          };
        });
        return { name: m.name, background: m.background, sprites: spriteData };
      });
      return { maps: savedMaps, currentMap, players };
    }

    function restoreAllData(data) {
      players = data.players || [];
      currentMap = data.currentMap || 0;
      maps = data.maps.map(m => {
        const domSprites = m.sprites.map(sd => {
          const sp = document.createElement('div');
          sp.className = 'sprite';
          sp.style.left = sd.x + 'px';
          sp.style.top = sd.y + 'px';
          sp.setAttribute('data-scale', sd.scale);
          
          let html = `<div class="sprite-emoji" style="transform: scale(${sd.scale})">${sd.emoji}</div>
                      <div class="sprite-label">${sd.label}</div>`;
          
          if (sd.isEnemy) {
            sp.setAttribute('data-hp', sd.hp);
            sp.setAttribute('data-maxhp', sd.maxHp);
            const pct = Math.max(0, (sd.hp / sd.maxHp) * 100);
            html += `<div class="hp-bar-container"><div class="hp-bar-fill" style="width:${pct}%"></div></div>`;
          }
          sp.innerHTML = html;
          enableClickAndDrag(sp);
          return sp;
        });
        return { name: m.name, background: m.background, sprites: domSprites };
      });
      
      renderTabs();
      renderBgPicker();
      renderPlayers();
      switchMap(currentMap);
    }

    function manualSave() {
      saveToLocal();
      const json = localStorage.getItem('quickdnd_v2_save');
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'QuickDnD_Campaign.json';
      a.click();
    }

    function loadGame(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = evt => {
        try {
          restoreAllData(JSON.parse(evt.target.result));
          saveToLocal();
          document.getElementById('welcome-screen').classList.add('exit-screen');
          setTimeout(() => document.getElementById('welcome-screen').style.display = 'none', 800);
        } catch (err) { alert('Invalid Save File'); }
      };
      reader.readAsText(file);
    }

    /****************************************************************
     * INITIALIZATION & UI
     ****************************************************************/
    function startEngine(isLoad) {
      if (!isLoad) {
        const saved = localStorage.getItem('quickdnd_v2_save');
        if (saved) { restoreAllData(JSON.parse(saved)); }
        else { renderTabs(); renderBgPicker(); switchMap(0); }
      }
      populateAssets();
      document.getElementById('welcome-screen').classList.add('exit-screen');
      setTimeout(() => document.getElementById('welcome-screen').style.display = 'none', 800);
    }

    function toggleSidebar() {
      const w = document.getElementById('sidebar-wrapper');
      const t = document.getElementById('sidebar-toggle');
      w.classList.toggle('collapsed');
      t.textContent = w.classList.contains('collapsed') ? '<' : '>';
    }

    function renderTabs() {
      const bar = document.getElementById('map-tabs');
      bar.innerHTML = '';
      maps.forEach((m, i) => {
        const btn = document.createElement('div');
        btn.className = `map-tab ${i === currentMap ? 'active' : ''}`;
        btn.textContent = m.name;
        btn.onclick = () => switchMap(i);
        bar.appendChild(btn);
      });
    }

    function addMap() {
      maps.push({ name: `Map ${maps.length + 1}`, background: backgrounds[0].style, sprites: [] });
      renderTabs();
      switchMap(maps.length - 1);
      saveToLocal();
    }

    function switchMap(i) {
      currentMap = i;
      document.getElementById('map-background').style.background = maps[i].background;
      const cont = document.getElementById('map-container');
      cont.querySelectorAll('.sprite').forEach(s => s.remove());
      maps[i].sprites.forEach(sp => cont.appendChild(sp));
      selectedSprite = null;
      updateSelectionPanel();
      renderTabs();
      saveToLocal();
    }

    function renderBgPicker() {
      const cont = document.getElementById('bg-picker');
      cont.innerHTML = '';
      backgrounds.forEach(bg => {
        const thumb = document.createElement('div');
        thumb.className = 'bg-thumb';
        thumb.style.background = bg.style;
        thumb.onclick = () => {
          maps[currentMap].background = bg.style;
          document.getElementById('map-background').style.background = bg.style;
          saveToLocal();
        };
        cont.appendChild(thumb);
      });
    }

    /****************************************************************
     * ASSETS & DRAG/DROP
     ****************************************************************/
    function populateAssets() {
      const pGrid = document.getElementById('grid-props');
      propData.forEach(([e, n]) => {
        const el = document.createElement('div');
        el.className = 'asset-item'; el.textContent = e; el.draggable = true;
        el.ondragstart = (evt) => evt.dataTransfer.setData('text/plain', JSON.stringify({ type: 'prop', e, n }));
        pGrid.appendChild(el);
      });

      const eGrid = document.getElementById('grid-enemies');
      enemyData.forEach(ent => {
        const el = document.createElement('div');
        el.className = 'asset-item'; el.textContent = ent.e; el.draggable = true;
        el.ondragstart = (evt) => evt.dataTransfer.setData('text/plain', JSON.stringify({ type: 'enemy', ...ent }));
        eGrid.appendChild(el);
      });
    }

    function onMapDrop(e) {
      e.preventDefault();
      const raw = e.dataTransfer.getData('text/plain');
      if (!raw) return;
      const data = JSON.parse(raw);
      
      const sp = document.createElement('div');
      sp.className = 'sprite';
      sp.style.left = (e.clientX - 40) + 'px';
      sp.style.top = (e.clientY - 40) + 'px';
      sp.setAttribute('data-scale', '1.0');

      let html = `<div class="sprite-emoji">${data.e || data.emoji}</div>
                  <div class="sprite-label">${data.n || data.name}</div>`;

      if (data.type === 'enemy') {
        const partyLvl = getPartyAvgLevel();
        const maxHp = Math.floor(data.baseHp + (partyLvl * 2));
        sp.setAttribute('data-hp', maxHp);
        sp.setAttribute('data-maxhp', maxHp);
        html += `<div class="hp-bar-container"><div class="hp-bar-fill" style="width:100%"></div></div>`;
      }

      sp.innerHTML = html;
      enableClickAndDrag(sp);
      
      maps[currentMap].sprites.push(sp);
      document.getElementById('map-container').appendChild(sp);
      
      // Auto-select new drop
      selectSprite(sp);
      saveToLocal();
    }

    function enableClickAndDrag(sp) {
      let isDragging = false;
      let offsetX, offsetY;
      
      sp.addEventListener('mousedown', e => {
        e.stopPropagation();
        if (e.button === 2) { // Right click delete
          sp.remove();
          maps[currentMap].sprites = maps[currentMap].sprites.filter(x => x !== sp);
          if (selectedSprite === sp) { selectedSprite = null; updateSelectionPanel(); }
          saveToLocal();
          return;
        }
        
        isDragging = true;
        offsetX = e.offsetX; offsetY = e.offsetY;
        
        // Handle Smart Combat Click
        if (pendingDamage > 0 && sp.hasAttribute('data-hp')) {
          applyDamage(sp, pendingDamage, e.clientX, e.clientY);
          pendingDamage = 0;
          document.getElementById('map-container').querySelectorAll('.sprite').forEach(s => s.classList.remove('targeted'));
          document.getElementById('spinner-readout').textContent = "Damage Applied.";
          return;
        }

        selectSprite(sp);
      });

      document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        sp.style.left = (e.clientX - offsetX) + 'px';
        sp.style.top = (e.clientY - offsetY) + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) { isDragging = false; saveToLocal(); }
      });
    }

    function handleMapClick(e) {
      if (e.target.id === 'map-container' || e.target.id === 'map-background') {
        selectedSprite = null;
        updateSelectionPanel();
      }
    }

    /****************************************************************
     * SELECTION & COMBAT LOGIC
     ****************************************************************/
    function selectSprite(sp) {
      document.querySelectorAll('.sprite').forEach(s => s.classList.remove('selected'));
      sp.classList.add('selected');
      selectedSprite = sp;
      updateSelectionPanel();
    }

    function updateSelectionPanel() {
      const p = document.getElementById('selection-panel');
      if (!selectedSprite) { p.classList.remove('active'); return; }
      
      p.classList.add('active');
      document.getElementById('sel-name').textContent = selectedSprite.querySelector('.sprite-label').textContent;
      document.getElementById('sel-scale').textContent = parseFloat(selectedSprite.getAttribute('data-scale')).toFixed(1);

      const hpRow = document.getElementById('sel-hp-row');
      if (selectedSprite.hasAttribute('data-hp')) {
        hpRow.style.display = 'flex';
        document.getElementById('sel-hp').textContent = `${selectedSprite.getAttribute('data-hp')}/${selectedSprite.getAttribute('data-maxhp')}`;
      } else {
        hpRow.style.display = 'none';
      }
    }

    function resizeSelected(amt) {
      if (!selectedSprite) return;
      let s = parseFloat(selectedSprite.getAttribute('data-scale')) + amt;
      s = Math.max(0.4, Math.min(5.0, s));
      selectedSprite.setAttribute('data-scale', s);
      selectedSprite.querySelector('.sprite-emoji').style.transform = `scale(${s})`;
      document.getElementById('sel-scale').textContent = s.toFixed(1);
      saveToLocal();
    }

    function modifySelectedHp(amt) {
      if (!selectedSprite || !selectedSprite.hasAttribute('data-hp')) return;
      let hp = parseInt(selectedSprite.getAttribute('data-hp')) + amt;
      let maxHp = parseInt(selectedSprite.getAttribute('data-maxhp'));
      hp = Math.max(0, Math.min(maxHp, hp));
      
      selectedSprite.setAttribute('data-hp', hp);
      selectedSprite.querySelector('.hp-bar-fill').style.width = `${(hp/maxHp)*100}%`;
      document.getElementById('sel-hp').textContent = `${hp}/${maxHp}`;
      saveToLocal();
    }

    function killSelected() {
      if (!selectedSprite) return;
      awardPartyXp(5); // Flat XP for manual kill
      selectedSprite.remove();
      maps[currentMap].sprites = maps[currentMap].sprites.filter(x => x !== selectedSprite);
      selectedSprite = null;
      updateSelectionPanel();
      saveToLocal();
    }

    function applyDamage(sp, dmg, cx, cy) {
      let hp = parseInt(sp.getAttribute('data-hp')) - dmg;
      let maxHp = parseInt(sp.getAttribute('data-maxhp'));
      
      // Floating Text
      const f = document.createElement('div');
      f.className = 'dmg-text'; f.textContent = `-${dmg}`;
      f.style.left = cx + 'px'; f.style.top = cy + 'px';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 1200);

      if (hp <= 0) {
        awardPartyXp(Math.max(2, Math.floor(maxHp / 3))); // XP based on enemy toughness
        sp.remove();
        maps[currentMap].sprites = maps[currentMap].sprites.filter(x => x !== sp);
        if (selectedSprite === sp) { selectedSprite = null; updateSelectionPanel(); }
      } else {
        sp.setAttribute('data-hp', hp);
        sp.querySelector('.hp-bar-fill').style.width = `${(hp/maxHp)*100}%`;
        if (selectedSprite === sp) updateSelectionPanel();
      }
      saveToLocal();
    }

    /****************************************************************
     * PLAYERS & PROGRESSION
     ****************************************************************/
    function addPlayer() {
      const colors = ['🔴', '🔵', '🟢', '🟣', '🟡'];
      const c = colors[players.length % colors.length];
      players.push({ id: Date.now(), name: `Hero ${players.length+1}`, color: c, hp: 20, maxHp: 20, level: 1, xp: 0, inventory: [] });
      renderPlayers();
      saveToLocal();
    }

    function getPartyAvgLevel() {
      if (players.length === 0) return 1;
      return Math.floor(players.reduce((s, p) => s + p.level, 0) / players.length);
    }

    function getPartyMaxBonus() {
      let max = 0;
      players.forEach(p => p.inventory.forEach(i => { if (i.bonus > max) max = i.bonus; }));
      return max;
    }

    function awardPartyXp(amt) {
      players.forEach(p => {
        p.xp += amt;
        const req = p.level * 10;
        if (p.xp >= req) { p.xp -= req; p.level++; p.maxHp += 5; p.hp = p.maxHp; }
      });
      renderPlayers();
      saveToLocal();
    }

    function renderPlayers() {
      const list = document.getElementById('players-list');
      list.innerHTML = '';
      players.forEach((p, index) => {
        const req = p.level * 10;
        const pct = Math.min(100, (p.xp / req) * 100);
        
        const b = document.createElement('div');
        b.className = 'player-box';
        b.style.borderColor = p.color === '🔴' ? '#e74c3c' : p.color === '🔵' ? '#3498db' : '#2ecc71'; // Simple mapped border
        
        b.innerHTML = `
          <div class="flex-between">
            <span style="cursor:grab" draggable="true" ondragstart="event.dataTransfer.setData('text/plain', JSON.stringify({type:'prop', e:'${p.color}', n:'${p.name}'}))">${p.color} <strong>${p.name}</strong></span>
            <span style="font-size:12px; color:#aaa;">Lvl ${p.level}</span>
          </div>
          <div class="p-stat">
            <div class="math-ctrl">
              <button class="math-btn" onclick="modPlayerHp(${index}, -1)">-</button>
              <span>HP: ${p.hp}/${p.maxHp}</span>
              <button class="math-btn" onclick="modPlayerHp(${index}, 1)">+</button>
            </div>
            <div style="display:flex; align-items:center;">
              XP
              <div class="xp-bar"><div class="xp-fill" style="width:${pct}%"></div></div>
            </div>
          </div>
          <div class="inventory" ondragover="event.preventDefault()" ondrop="handleInvDrop(event, ${index})">
            ${p.inventory.map((i, idx) => `<span class="inv-item" oncontextmenu="event.preventDefault(); removeInvItem(${index}, ${idx})">${i.emoji} ${i.name}</span>`).join('')}
          </div>
        `;
        list.appendChild(b);
      });
    }

    function modPlayerHp(pIndex, amt) {
      players[pIndex].hp = Math.max(0, Math.min(players[pIndex].maxHp, players[pIndex].hp + amt));
      renderPlayers();
      saveToLocal();
    }

    /****************************************************************
     * LOOT & INVENTORY
     ****************************************************************/
    function dropLoot(tier) {
      const pool = lootTables[tier];
      const item = pool[Math.floor(Math.random() * pool.length)];
      
      const sp = document.createElement('div');
      sp.className = 'sprite';
      sp.style.left = (window.innerWidth / 2 - 40) + 'px';
      sp.style.top = (window.innerHeight / 2 - 40) + 'px';
      sp.setAttribute('data-scale', '1.0');
      
      sp.innerHTML = `<div class="sprite-emoji">${item.emoji}</div>
                      <div class="sprite-label">${item.name}</div>`;
      
      // Store item data for inventory drag
      sp.setAttribute('data-item', JSON.stringify(item));
      sp.draggable = true;
      sp.ondragstart = (e) => e.dataTransfer.setData('application/json', JSON.stringify({ source: 'mapLoot', item: item, domId: maps[currentMap].sprites.indexOf(sp) }));
      
      enableClickAndDrag(sp);
      maps[currentMap].sprites.push(sp);
      document.getElementById('map-container').appendChild(sp);
      saveToLocal();
    }

    function handleInvDrop(e, pIndex) {
      e.preventDefault();
      const raw = e.dataTransfer.getData('application/json');
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.source === 'mapLoot') {
        players[pIndex].inventory.push(data.item);
        // Remove from map
        const sp = maps[currentMap].sprites[data.domId];
        if (sp) { sp.remove(); maps[currentMap].sprites.splice(data.domId, 1); }
        renderPlayers();
        saveToLocal();
      }
    }

    function removeInvItem(pIndex, iIndex) {
      players[pIndex].inventory.splice(iIndex, 1);
      renderPlayers();
      saveToLocal();
    }

    /****************************************************************
     * SPINNER ENGINE
     ****************************************************************/
    function spinWheel(dcBase) {
      const readout = document.getElementById('spinner-readout');
      const partyLvl = getPartyAvgLevel();
      const itemBonus = getPartyMaxBonus();
      
      const roll = Math.floor(Math.random() * 20) + 1;
      const total = roll + partyLvl + itemBonus;
      
      let outcome;
      let calcDmg = 0;

      if (roll === 20 || total >= dcBase + 5) { outcome = spinOutcomes[0]; calcDmg = (partyLvl + itemBonus + 5) * 2; }
      else if (total >= dcBase) { outcome = spinOutcomes[1]; calcDmg = partyLvl + itemBonus + 3; }
      else if (total >= dcBase - 2) { outcome = spinOutcomes[2]; calcDmg = Math.max(1, Math.floor((partyLvl + itemBonus)/2)); }
      else if (total >= dcBase - 5) { outcome = spinOutcomes[3]; }
      else if (roll === 1) { outcome = spinOutcomes[5]; }
      else { outcome = spinOutcomes[4]; }

      // Suspense Animation
      let ticks = 0;
      readout.style.color = "white";
      const interval = setInterval(() => {
        readout.textContent = spinOutcomes[Math.floor(Math.random() * spinOutcomes.length)].text;
        ticks++;
        if (ticks > 20) {
          clearInterval(interval);
          readout.textContent = outcome.text;
          readout.style.color = outcome.color;
          
          if (outcome.xp > 0) awardPartyXp(outcome.xp);
          
          if (calcDmg > 0) {
            pendingDamage = calcDmg;
            document.getElementById('map-container').querySelectorAll('.sprite[data-hp]').forEach(s => s.classList.add('targeted'));
            setTimeout(() => { readout.innerHTML = `<span style="color:${outcome.color}">${outcome.text}</span><br><span style="font-size:10px; color:#fff;">Click enemy to deal ${calcDmg} DMG</span>`; }, 500);
          } else {
            pendingDamage = 0;
          }
        }
      }, 70);
    }

  </script>
