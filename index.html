<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickDnD Engine v4.0 - Master Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-stone: #1a1a1a;
      --panel-wood: #251b14;
      --border-gold: #c5a059;
      --text-light: #eaddc5;
      --accent-red: #8b0000;
      --accent-blue: #2980b9;
      --font-header: 'Cinzel', serif;
      --font-body: 'Lora', serif;
    }

    * { box-sizing: border-box; user-select: none; }
    body { margin: 0; overflow: hidden; height: 100vh; font-family: var(--font-body); background: var(--bg-stone); color: var(--text-light); }

    h1, h2, h3, h4 { font-family: var(--font-header); margin: 0 0 8px 0; color: var(--border-gold); }
    
    .btn {
      background: linear-gradient(to bottom, #3e2a1f, #1f140e); color: var(--text-light);
      border: 1px solid var(--border-gold); padding: 6px 12px; cursor: pointer;
      font-family: var(--font-header); font-weight: bold; border-radius: 4px;
      transition: all 0.2s ease; text-align: center;
    }
    .btn:hover { background: linear-gradient(to bottom, #4f3628, #2e1d15); box-shadow: 0 0 8px rgba(197, 160, 89, 0.4); }
    
    /* LAYOUT */
    #view-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; }
    #map-view { position: absolute; width: 100%; height: 100%; }
    #map-background { position: absolute; width: 100%; height: 100%; z-index: 0; background-size: cover; background-position: center; }
    
    /* ATLAS */
    #world-view { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      background: #c2b280 url('https://www.transparenttextures.com/patterns/topography.png'); 
      background-blend-mode: multiply; display: none; z-index: 9000; 
    }
    #world-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .world-node {
      position: absolute; width: 60px; height: 60px; background: var(--panel-wood); border: 2px solid var(--border-gold);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: grab;
      box-shadow: 0 5px 15px rgba(0,0,0,0.6); z-index: 10; font-family: var(--font-header); font-size: 11px; text-align: center;
    }
    .world-node.linking { border-color: #00ffaa; box-shadow: 0 0 15px #00ffaa; }

    /* SPRITES */
    .sprite { position: absolute; display: flex; flex-direction: column; align-items: center; cursor: grab; z-index: 10; transform-origin: bottom center; }
    .sprite-emoji { font-size: 70px; line-height: 1; filter: drop-shadow(2px 5px 5px rgba(0,0,0,0.8)); pointer-events: none; }
    .sprite-label { font-size: 12px; background: rgba(0,0,0,0.8); padding: 2px 6px; border: 1px solid var(--border-gold); border-radius: 4px; margin-top: 2px; pointer-events: none; }
    .hp-bar-container { width: 100%; height: 6px; background: #000; border: 1px solid #000; border-radius: 3px; margin-top: 4px; overflow: hidden; pointer-events: none; }
    .hp-bar-fill { height: 100%; background: var(--accent-red); width: 100%; transition: width 0.3s; }

    /* SIDEBAR */
    #sidebar {
      position: absolute; top: 0; right: 0; width: 380px; height: 100%; 
      background: rgba(26, 26, 26, 0.98); border-left: 2px solid var(--border-gold); 
      padding: 12px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; z-index: 10000;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 3px; }

    /* MODE TOGGLE */
    .mode-switch { display: flex; background: #111; border: 1px solid #444; border-radius: 6px; overflow: hidden; margin-bottom: 5px; }
    .mode-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-family: var(--font-header); transition: 0.3s; color: #888; background: transparent; border: none; font-size: 14px; font-weight: bold; }
    .mode-btn.active { background: var(--border-gold); color: #000; }

    .panel { background: rgba(0,0,0,0.4); border: 1px solid #4a3623; border-radius: 6px; padding: 10px; }
    .flex-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }

    /* MODE VISIBILITY CLASSES */
    body.mode-builder .dm-only { display: none !important; }
    body.mode-dm .builder-only { display: none !important; }

    /* MAP TABS & BGS */
    #map-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; }
    .map-tab { padding: 4px 8px; background: #111; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .map-tab.active { background: var(--border-gold); color: #000; font-weight: bold; }
    #bg-picker { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; margin-top: 5px; }
    .bg-thumb { width: 30px; height: 30px; flex-shrink: 0; cursor: pointer; border: 1px solid #555; border-radius: 4px; }

    /* PLAYERS */
    .player-box { background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 6px; padding: 8px; margin-bottom: 6px; transition: all 0.2s; }
    .player-box.active-hero { border-color: var(--border-gold); box-shadow: 0 0 10px rgba(197, 160, 89, 0.4); background: rgba(44, 30, 22, 0.8); }
    .p-stat-row { display: flex; justify-content: space-between; font-size: 12px; margin-top: 4px; align-items: center; }
    .math-ctrl { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; }
    .math-btn { background: none; border: none; color: var(--border-gold); cursor: pointer; font-size: 14px; font-weight: bold; }
    .xp-bar { flex: 1; height: 6px; background: #000; margin: 0 8px; border-radius: 3px; border: 1px solid #333; overflow: hidden; }
    .xp-fill { height: 100%; background: var(--accent-blue); width: 0%; transition: width 0.3s; }
    .inventory { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding: 4px; background: rgba(0,0,0,0.4); border-radius: 4px; min-height: 28px; border: 1px dashed #555; }
    .inv-item { font-size: 11px; background: #222; border: 1px solid var(--border-gold); padding: 2px 4px; border-radius: 4px; cursor: grab; }

    /* SPINNER */
    #spinner-readout {
      background: #000; border: 1px solid var(--border-gold); border-radius: 6px; padding: 10px;
      text-align: center; margin-top: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); min-height: 65px; display: flex; flex-direction: column; justify-content: center;
    }
    .spin-result { font-family: var(--font-header); font-size: 18px; font-weight: bold; }
    .spin-math { font-size: 11px; color: #aaa; margin-top: 4px; font-family: monospace; }

    /* ASSET GRIDS */
    .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 4px; max-height: 180px; overflow-y: auto; }
    .asset-item { font-size: 24px; text-align: center; cursor: grab; padding: 4px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 4px; }
    .asset-item:hover { border-color: var(--border-gold); }

    /* CURSORS / TARGETING */
    body.damage-mode { cursor: crosshair; }
    body.damage-mode #map-view .sprite[data-hp] { filter: drop-shadow(0 0 8px #ff0000); }
    body.loot-mode { cursor: crosshair; }
    body.loot-mode .player-box { border-color: #9b59b6; cursor: pointer; }

    .float-text { position: absolute; font-family: var(--font-header); font-size: 32px; font-weight: bold; pointer-events: none; z-index: 9999; animation: floatUp 1.2s forwards ease-out; text-shadow: 2px 2px 0 #000; }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }

    /* WELCOME SCREEN */
    #welcome-screen { position: absolute; top:0; left:0; width: 100%; height: 100%; background: #0a0a0c; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body class="mode-builder">

  <div id="welcome-screen">
    <h1 style="font-size: 48px; margin-bottom: 30px;">QuickDnD Engine</h1>
    <div class="flex-row">
      <button class="btn" style="font-size: 20px; padding: 15px 30px;" onclick="init(false)">New Campaign</button>
      <button class="btn" style="font-size: 20px; padding: 15px 30px;" onclick="document.getElementById('start-load').click()">Load .json</button>
      <input type="file" id="start-load" accept=".json" style="display:none" onchange="init(true, event)">
    </div>
  </div>

  <div id="view-container">
    <div id="map-view" ondragover="event.preventDefault()" ondrop="onMapDrop(event)" onclick="handleMapClick(event)">
      <div id="map-background"></div>
    </div>
    
    <div id="world-view">
      <svg id="world-svg"></svg>
      <div style="position: absolute; top: 20px; left: 20px; z-index: 20;">
        <h2 style="color: #2c1e16; text-shadow: none;">Campaign Atlas</h2>
        <button class="btn" onclick="toggleWorldMap()">Return to Map</button>
        <button class="btn builder-only" id="link-btn" onclick="toggleLinkMode()" style="margin-left: 10px;">Draw Path</button>
      </div>
      <div id="world-nodes-container"></div>
    </div>
  </div>

  <div id="sidebar">
    <div class="flex-between" style="margin-bottom: 5px;">
      <button class="btn" onclick="manualSave()" style="padding: 4px 8px; font-size:12px;">💾 Save .json</button>
      <button class="btn" onclick="toggleWorldMap()" style="padding: 4px 8px; font-size:12px;">🗺️ Atlas</button>
    </div>

    <div class="mode-switch">
      <button class="mode-btn active" id="btn-mode-build" onclick="setMode('builder')">Builder Mode</button>
      <button class="mode-btn" id="btn-mode-dm" onclick="setMode('dm')">DM Mode</button>
    </div>

    <div class="panel builder-only">
      <div class="flex-between"><h3>Locations</h3> <button class="btn" onclick="addMap()" style="padding: 2px 6px; font-size:11px;">+ Map</button></div>
      <div id="map-tabs"></div>
      <div style="font-size:10px; color:#aaa; margin-top:4px;">Double-click tab to rename</div>
      <div id="bg-picker"></div>
    </div>

    <div class="panel builder-only">
      <h3>Props & Environment</h3>
      <div class="asset-grid" id="grid-props"></div>
    </div>

    <div class="panel builder-only">
      <h3>Monsters</h3>
      <div class="asset-grid" id="grid-enemies"></div>
    </div>

    <div class="panel dm-only">
      <div class="flex-between">
        <h3>The Party</h3>
        <button class="btn" onclick="addPlayer()" style="padding: 2px 6px; font-size:11px;">+ Hero</button>
      </div>
      <div style="font-size:10px; color:#aaa; margin-bottom: 6px;">Double-click to set Active Hero. Right-click to edit.</div>
      <div id="players-list"></div>
    </div>

    <div class="panel dm-only">
      <h3>Action Spinner (Active Hero)</h3>
      <div class="flex-row" style="justify-content: center; gap: 4px;">
        <button class="btn" onclick="spinWheel(5)">Triv (5)</button>
        <button class="btn" onclick="spinWheel(10)">Easy (10)</button>
        <button class="btn" onclick="spinWheel(15)">Med (15)</button>
        <button class="btn" onclick="spinWheel(20)">Hard (20)</button>
        <button class="btn" style="border-color:#e74c3c; color:#e74c3c" onclick="spinWheel(25)">Legend (25)</button>
      </div>
      <div id="spinner-readout">
        <div class="spin-result" style="color:#aaa;">Awaiting Action</div>
      </div>
    </div>

    <div class="panel dm-only">
      <h3>Spawn Loot (Click Tier -> Click Player)</h3>
      <div class="flex-row">
        <button class="btn" style="flex:1" onclick="startLootMode('average')">Standard</button>
        <button class="btn" style="flex:1; border-color:#3498db; color:#3498db" onclick="startLootMode('good')">Rare</button>
        <button class="btn" style="flex:1; border-color:#9b59b6; color:#9b59b6;" onclick="startLootMode('mythic')">Mythic</button>
      </div>
    </div>

  </div>

  <script>
    /* ================= DATA & PRESETS ================= */
    const presetsBG = [
      { s: 'repeating-linear-gradient(45deg, #2e302b 0, #2e302b 20px, #262823 20px, #262823 40px)' }, // Dark Grid
      { s: 'repeating-linear-gradient(45deg, #2e7d32 0px, #2e7d32 15px, #388e3c 15px, #388e3c 30px)' }, // Grass
      { s: 'repeating-linear-gradient(45deg, #555 0px, #555 15px, #444 15px, #444 30px)' }, // Stone
      { s: 'repeating-linear-gradient(45deg, #c2b280 0px, #c2b280 20px, #b2a170 20px, #b2a170 40px)' }, // Sand
      { s: 'repeating-linear-gradient(45deg, #8B5A2B 0px, #8B5A2B 15px, #6e3f1a 15px, #6e3f1a 30px)' }, // Wood
      { s: 'repeating-linear-gradient(45deg, #2980b9 0px, #2980b9 15px, #3498db 15px, #3498db 30px)' }, // Water
      { s: 'repeating-linear-gradient(45deg, #e0f7fa 0px, #e0f7fa 15px, #cdeffc 15px, #cdeffc 30px)' }, // Ice
      { s: 'linear-gradient(to bottom, #141e30, #243b55)' } // Night
    ];

    const propData = [
      ['🌳', 'Tree'], ['🌲', 'Pine'], ['🪨', 'Rock'], ['🧱', 'Wall'], ['🚪', 'Door'], ['🪵', 'Log'], 
      ['🔥', 'Fire'], ['⛺', 'Tent'], ['📦', 'Crate'], ['宝', 'Chest'], ['🩸', 'Blood'], ['☠️', 'Bones'],
      ['🪑', 'Chair'], ['🛏️', 'Bed'], ['🕯️', 'Candle'], ['📜', 'Scroll'], ['💰', 'Gold'], ['🪤', 'Trap']
    ];

    const enemyData = [
      { e: '🐀', n: 'Rat', hp: 6 }, { e: '🦇', n: 'Bat', hp: 8 }, { e: '🕷️', n: 'Spider', hp: 12 }, 
      { e: '🐺', n: 'Wolf', hp: 18 }, { e: '👺', n: 'Goblin', hp: 15 }, { e: '💀', n: 'Skeleton', hp: 14 }, 
      { e: '🧟', n: 'Zombie', hp: 20 }, { e: '👹', n: 'Orc', hp: 30 }, { e: '🧛', n: 'Vampire', hp: 45 }, 
      { e: '🧙', n: 'Cultist', hp: 25 }, { e: '🐉', n: 'Dragon', hp: 100 }, { e: '👁️', n: 'Beholder', hp: 80 }, 
      { e: '🐙', n: 'Kraken', hp: 120 }, { e: '👻', n: 'Ghost', hp: 22 }, { e: '🐍', n: 'Snake', hp: 10 }
    ];

    const lootTables = {
      average: [
        { e: '🗡️', n: 'Iron Sword', b: 1 }, { e: '🛡️', n: 'Wooden Shield', b: 1 }, { e: '🧪', n: 'Health Vial', b: 0 }, 
        { e: '🏹', n: 'Shortbow', b: 1 }, { e: '🪓', n: 'Hand Axe', b: 1 }, { e: '💰', n: 'Silver Coins', b: 0 }
      ],
      good: [
        { e: '⚔️', n: 'Steel Broadsword', b: 2 }, { e: '🛡️', n: 'Kite Shield', b: 2 }, { e: '💍', n: 'Ring of Focus', b: 2 },
        { e: '🪄', n: 'Wand of Sparks', b: 2 }, { e: '🔨', n: 'Warhammer', b: 2 }, { e: '💎', n: 'Ruby', b: 0 }
      ],
      mythic: [
        { e: '⚡', n: 'Stormbringer', b: 3 }, { e: '👑', n: 'Crown of Kings', b: 3 }, { e: '⏳', n: 'Time Amulet', b: 3 },
        { e: '🗡️', n: 'Vorpal Blade', b: 3 }, { e: '🔮', n: 'Orb of True Sight', b: 3 }
      ]
    };

    /* ================= STATE ================= */
    let maps = [];
    let worldPaths = [];
    let currentMapIndex = 0;
    
    let players = [];
    let activePlayerId = null;

    let isWorldMode = false;
    let isLinkingMode = false;
    let linkStartNode = null;
    
    let pendingLoot = null;
    let pendingDamage = 0;

    /* ================= INIT & SAVE ================= */
    function init(isLoad, event) {
      document.getElementById('welcome-screen').style.display = 'none';
      document.addEventListener('contextmenu', e => e.preventDefault());

      if (isLoad) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = evt => { 
          try { restoreData(JSON.parse(evt.target.result)); boot(); } 
          catch(e) { alert('Invalid file'); bootDefault(); }
        };
        reader.readAsText(file);
      } else {
        bootDefault();
      }
    }

    function bootDefault() {
      maps = [{ id: 'm1', name: "Starting Tavern", bg: presetsBG[0].s, sprites: [], wx: window.innerWidth/2, wy: window.innerHeight/2 }];
      addPlayer('🔴', 'Fighter'); addPlayer('🔵', 'Wizard');
      boot();
    }

    function boot() {
      populateAssets(); renderBgPicker(); renderTabs(); renderPlayers(); switchMap(currentMapIndex);
    }

    function gatherData() {
      maps.forEach((m, i) => {
        if (i === currentMapIndex) {
          const cont = document.getElementById('map-view');
          m.sprites = Array.from(cont.querySelectorAll('.sprite')).map(sp => {
            const isEnemy = sp.hasAttribute('data-hp');
            return {
              x: parseFloat(sp.style.left)||0, y: parseFloat(sp.style.top)||0,
              scale: parseFloat(sp.getAttribute('data-scale'))||1, emoji: sp.querySelector('.sprite-emoji').textContent,
              name: sp.querySelector('.sprite-label').textContent,
              isEnemy: isEnemy, hp: isEnemy ? parseInt(sp.getAttribute('data-hp')) : 0, maxHp: isEnemy ? parseInt(sp.getAttribute('data-maxhp')) : 0
            };
          });
        }
      });
      return { maps, worldPaths, currentMapIndex, players, activePlayerId };
    }

    function restoreData(data) {
      maps = data.maps || []; worldPaths = data.worldPaths || []; currentMapIndex = data.currentMapIndex || 0;
      players = data.players || []; activePlayerId = data.activePlayerId || (players.length ? players[0].id : null);
    }

    function manualSave() {
      const data = gatherData();
      const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'Fantasy_Campaign.json'; a.click();
    }

    /* ================= MODES ================= */
    function setMode(mode) {
      document.body.className = `mode-${mode}`;
      document.getElementById('btn-mode-build').classList.toggle('active', mode === 'builder');
      document.getElementById('btn-mode-dm').classList.toggle('active', mode === 'dm');
    }

    /* ================= MAPS & ATLAS ================= */
    function renderTabs() {
      const bar = document.getElementById('map-tabs'); bar.innerHTML = '';
      maps.forEach((m, i) => {
        const t = document.createElement('div');
        t.className = `map-tab ${i === currentMapIndex && !isWorldMode ? 'active' : ''}`;
        t.textContent = m.name;
        t.onclick = () => { if(isWorldMode) toggleWorldMap(); switchMap(i); };
        t.ondblclick = () => { const n = prompt("Rename map:", m.name); if(n) { m.name = n; renderTabs(); renderWorldNodes(); } };
        bar.appendChild(t);
      });
    }

    function addMap() {
      maps.push({ id: 'm'+Date.now(), name: `Region ${maps.length+1}`, bg: presetsBG[0].s, sprites: [], wx: 100+(maps.length*30), wy: 100+(maps.length*30) });
      renderTabs(); switchMap(maps.length - 1); if(isWorldMode) renderWorldNodes();
    }

    function switchMap(idx) {
      if(isWorldMode) return;
      gatherData(); currentMapIndex = idx;
      document.getElementById('map-background').style.background = maps[idx].bg;
      const cont = document.getElementById('map-view'); cont.querySelectorAll('.sprite').forEach(s => s.remove());
      maps[idx].sprites.forEach(sd => cont.appendChild(buildSprite(sd)));
      renderTabs();
    }

    function toggleWorldMap() {
      isWorldMode = !isWorldMode;
      const wv = document.getElementById('world-view');
      if (isWorldMode) { gatherData(); wv.style.display = 'block'; renderTabs(); renderWorldNodes(); } 
      else { wv.style.display = 'none'; isLinkingMode = false; switchMap(currentMapIndex); }
    }

    function renderWorldNodes() {
      const cont = document.getElementById('world-nodes-container'); cont.innerHTML = '';
      maps.forEach((m, i) => {
        const n = document.createElement('div'); n.className = 'world-node'; n.textContent = m.name;
        n.style.left = m.wx + 'px'; n.style.top = m.wy + 'px';
        n.onclick = () => {
          if (isLinkingMode) {
            if (!linkStartNode) { linkStartNode = m.id; n.classList.add('linking'); }
            else { if (linkStartNode !== m.id) worldPaths.push({from: linkStartNode, to: m.id}); linkStartNode = null; document.querySelectorAll('.world-node').forEach(el=>el.classList.remove('linking')); drawWorldLines(); }
          }
        };
        n.ondblclick = () => { toggleWorldMap(); switchMap(i); };
        let isDrag = false, ox, oy;
        n.onmousedown = (e) => { if (isLinkingMode) return; isDrag = true; ox = e.offsetX; oy = e.offsetY; n.style.zIndex = 20; };
        document.addEventListener('mousemove', e => { if (!isDrag) return; m.wx = e.clientX - ox; m.wy = e.clientY - oy; n.style.left = m.wx+'px'; n.style.top = m.wy+'px'; drawWorldLines(); });
        document.addEventListener('mouseup', () => { if (isDrag) { isDrag = false; n.style.zIndex = 10; } });
        cont.appendChild(n);
      });
      drawWorldLines();
    }

    function drawWorldLines() {
      const svg = document.getElementById('world-svg'); svg.innerHTML = '';
      worldPaths.forEach(p => {
        const m1 = maps.find(m => m.id === p.from); const m2 = maps.find(m => m.id === p.to);
        if (m1 && m2) {
          const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          l.setAttribute('x1', m1.wx+30); l.setAttribute('y1', m1.wy+30); l.setAttribute('x2', m2.wx+30); l.setAttribute('y2', m2.wy+30);
          l.setAttribute('stroke', '#c5a059'); l.setAttribute('stroke-width', '3'); l.setAttribute('stroke-dasharray', '5,5'); svg.appendChild(l);
        }
      });
    }

    function toggleLinkMode() {
      isLinkingMode = !isLinkingMode; linkStartNode = null;
      document.querySelectorAll('.world-node').forEach(el => el.classList.remove('linking'));
      document.getElementById('link-btn').style.borderColor = isLinkingMode ? '#00ffaa' : '';
    }

    /* ================= BGS & ASSETS ================= */
    function renderBgPicker() {
      const cont = document.getElementById('bg-picker'); cont.innerHTML = '';
      presetsBG.forEach(bg => {
        const t = document.createElement('div'); t.className = 'bg-thumb'; t.style.background = bg.s;
        t.onclick = () => { maps[currentMapIndex].bg = bg.s; document.getElementById('map-background').style.background = bg.s; };
        cont.appendChild(t);
      });
    }

    function populateAssets() {
      const pGrid = document.getElementById('grid-props'); pGrid.innerHTML = '';
      propData.forEach(([e, n]) => pGrid.appendChild(createAssetThumb('prop', e, n)));
      const eGrid = document.getElementById('grid-enemies'); eGrid.innerHTML = '';
      enemyData.forEach(d => eGrid.appendChild(createAssetThumb('enemy', d.e, d.n, d.hp)));
    }

    function createAssetThumb(type, emoji, name, hp=0) {
      const el = document.createElement('div'); el.className = 'asset-item'; el.title = name; el.textContent = emoji; el.draggable = true;
      el.ondragstart = (e) => e.dataTransfer.setData('application/json', JSON.stringify({ type, emoji, name, hp }));
      return el;
    }

    function onMapDrop(e) {
      e.preventDefault(); if (isWorldMode) return;
      const raw = e.dataTransfer.getData('application/json'); if (!raw) return;
      const data = JSON.parse(raw);
      
      if (data.source === 'inventory') {
        const p = players[data.pIndex]; const item = p.inventory.splice(data.iIndex, 1)[0];
        renderPlayers(); data.emoji = item.e; data.name = item.n; data.type = 'prop';
      }

      const sd = { x: e.clientX - 35, y: e.clientY - 35, scale: 1.0, emoji: data.emoji, name: data.name, isEnemy: data.type === 'enemy', hp: 0, maxHp: 0 };
      if (sd.isEnemy) { sd.maxHp = data.hp; sd.hp = sd.maxHp; }
      
      const sp = buildSprite(sd);
      document.getElementById('map-view').appendChild(sp);
    }

    function buildSprite(sd) {
      const sp = document.createElement('div'); sp.className = 'sprite';
      sp.style.left = sd.x + 'px'; sp.style.top = sd.y + 'px'; sp.setAttribute('data-scale', sd.scale);

      let html = `<div class="sprite-emoji" style="transform: scale(${sd.scale})">${sd.emoji}</div><div class="sprite-label">${sd.name}</div>`;
      if (sd.isEnemy) {
        sp.setAttribute('data-hp', sd.hp); sp.setAttribute('data-maxhp', sd.maxHp);
        const pct = Math.max(0, (sd.hp / sd.maxHp) * 100);
        html += `<div class="hp-bar-container"><div class="hp-bar-fill" style="width:${pct}%"></div></div>`;
      }
      sp.innerHTML = html;

      let isDrag = false, ox, oy;
      sp.onmousedown = (e) => {
        if (e.button === 2) { e.preventDefault(); sp.remove(); return; } // Right click delete
        
        // Left click apply damage
        if (pendingDamage > 0 && sd.isEnemy) {
          applyDamage(sp, pendingDamage);
          pendingDamage = 0; document.body.classList.remove('damage-mode');
          return;
        }

        isDrag = true; ox = e.offsetX; oy = e.offsetY; sp.style.zIndex = 100;
      };
      document.addEventListener('mousemove', e => { if (!isDrag) return; sp.style.left = (e.clientX - ox) + 'px'; sp.style.top = (e.clientY - oy) + 'px'; });
      document.addEventListener('mouseup', () => { if (isDrag) { isDrag = false; sp.style.zIndex = 10; } });

      return sp;
    }

    function handleMapClick(e) {
      if (e.target.id === 'map-view' || e.target.id === 'map-background') {
        if(pendingDamage > 0) { pendingDamage = 0; document.body.classList.remove('damage-mode'); }
      }
    }

    /* ================= COMBAT & PLAYERS ================= */
    function applyDamage(sp, dmg) {
      let hp = parseInt(sp.getAttribute('data-hp')) - dmg;
      let maxHp = parseInt(sp.getAttribute('data-maxhp'));
      hp = Math.max(0, hp);
      sp.setAttribute('data-hp', hp);
      sp.querySelector('.hp-bar-fill').style.width = `${(hp/maxHp)*100}%`;
      
      spawnFloatText(sp, `-${dmg}`, '#ff3333');
      
      if (hp <= 0) {
        const xpGained = Math.floor(maxHp / 2);
        sp.remove();
        const p = getActivePlayer();
        if (p) { awardXp(p, xpGained); spawnFloatText({style:{left: (window.innerWidth/2)+'px', top: (window.innerHeight/2)+'px'}}, `+${xpGained} XP`, '#3498db'); }
      }
    }

    function spawnFloatText(elRef, text, color) {
      const f = document.createElement('div'); f.className = 'float-text'; f.textContent = text; f.style.color = color;
      f.style.left = parseFloat(elRef.style.left||0) + 20 + 'px'; f.style.top = parseFloat(elRef.style.top||0) - 20 + 'px';
      document.body.appendChild(f); setTimeout(() => f.remove(), 1200);
    }

    function addPlayer(emoji='🟢', name='New Hero') {
      const p = { id: Date.now(), name, color: emoji, hp: 20, maxHp: 20, level: 1, xp: 0, inventory: [] };
      players.push(p); if(!activePlayerId) activePlayerId = p.id;
      renderPlayers();
    }

    function getActivePlayer() { return players.find(p => p.id === activePlayerId); }
    function setPlayerActive(id) { activePlayerId = id; renderPlayers(); }

    function awardXp(p, amt) {
      p.xp += amt; const req = p.level * 20; // Harder leveling
      if (p.xp >= req) { p.xp -= req; p.level++; p.maxHp += 5; p.hp = p.maxHp; }
      renderPlayers();
    }

    function modPlayerHp(idx, amt) {
      players[idx].hp = Math.max(0, Math.min(players[idx].maxHp, players[idx].hp + amt)); renderPlayers();
    }

    function editPlayer(idx) {
      const p = players[idx];
      const nName = prompt("Hero Name:", p.name);
      const nCol = prompt("Hero Emoji:", p.color);
      if(nName) p.name = nName; if(nCol) p.color = nCol;
      renderPlayers();
    }

    function renderPlayers() {
      const list = document.getElementById('players-list'); list.innerHTML = '';
      players.forEach((p, index) => {
        const req = p.level * 20; const pct = Math.min(100, (p.xp / req) * 100);
        const isActive = p.id === activePlayerId;
        
        const b = document.createElement('div');
        b.className = `player-box ${isActive ? 'active-hero' : ''}`;
        b.ondblclick = () => setPlayerActive(p.id);
        b.oncontextmenu = (e) => { e.preventDefault(); editPlayer(index); };
        
        b.onclick = () => {
          if (pendingLoot) { p.inventory.push(pendingLoot.item); document.body.classList.remove('loot-mode'); pendingLoot = null; renderPlayers(); }
        };

        b.innerHTML = `
          <div class="flex-between">
            <span style="cursor:grab; font-family:var(--font-header); font-size:16px;" draggable="true" ondragstart="event.dataTransfer.setData('application/json', JSON.stringify({type:'prop', emoji:'${p.color}', name:'${p.name}'}))">${p.color} <strong>${p.name}</strong></span>
            <span style="font-size:12px; color:#aaa;">Lvl ${p.level}</span>
          </div>
          <div class="p-stat-row">
            <div class="math-ctrl"><button class="math-btn" onclick="event.stopPropagation(); modPlayerHp(${index}, -1)">-</button><span style="color:${p.hp <= p.maxHp/4 ? 'red' : 'white'}">HP: ${p.hp}/${p.maxHp}</span><button class="math-btn" onclick="event.stopPropagation(); modPlayerHp(${index}, 1)">+</button></div>
            <div class="xp-bar"><div class="xp-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="inventory">
            ${p.inventory.map((i, idx) => `<span class="inv-item" draggable="true" ondragstart="event.dataTransfer.setData('application/json', JSON.stringify({source:'inventory', pIndex:${index}, iIndex:${idx}}))">${i.e} ${i.n}</span>`).join('')}
          </div>
        `;
        list.appendChild(b);
      });
    }

    /* ================= LOOT & SPINNER ================= */
    function startLootMode(tier) {
      const item = lootTables[tier][Math.floor(Math.random() * lootTables[tier].length)];
      pendingLoot = { tier, item }; document.body.classList.add('loot-mode');
      document.getElementById('spinner-readout').innerHTML = `<div class="spin-result" style="color:#9b59b6;">Give ${item.n} to who?</div>`;
    }

    function spinWheel(dcBase) {
      const p = getActivePlayer(); if (!p) return;
      const readout = document.getElementById('spinner-readout');
      
      let itemBonus = 0; p.inventory.forEach(i => { if (i.b > itemBonus) itemBonus = i.b; });
      
      const roll = Math.floor(Math.random() * 20) + 1;
      const effDc = Math.max(0, dcBase - p.level);
      const total = roll + itemBonus;
      
      let outcome, dmg = 0, color;
      if (roll === 20) { outcome = "Critical Success!"; color = "#f1c40f"; dmg = (p.level + itemBonus + 5) * 2; }
      else if (roll === 1) { outcome = "Catastrophic Failure"; color = "#8b0000"; }
      else if (total >= effDc + 5) { outcome = "Great Success"; color = "#2ecc71"; dmg = p.level + itemBonus + 4; }
      else if (total >= effDc) { outcome = "Success"; color = "#27ae60"; dmg = p.level + itemBonus + 2; }
      else if (total >= effDc - 2) { outcome = "Barely Failed"; color = "#e67e22"; }
      else { outcome = "Failed"; color = "#e74c3c"; }

      readout.innerHTML = `<div class="spin-result" style="color:white;">Rolling...</div>`;
      setTimeout(() => {
        readout.innerHTML = `
          <div class="spin-result" style="color:${color};">${outcome}</div>
          <div class="spin-math">[Roll: ${roll} + Item: ${itemBonus} = ${total}] vs [DC ${dcBase} - Lvl ${p.level} = ${effDc}]</div>
          ${dmg > 0 ? `<div style="font-size:11px; color:#fff; margin-top:4px;">Left Click Enemy for ${dmg} DMG</div>` : ''}
        `;
        if (dmg > 0) { pendingDamage = dmg; document.body.classList.add('damage-mode'); }
      }, 800);
    }
  </script>
</body>
</html>
